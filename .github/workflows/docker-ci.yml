name: Multi-Stage Docker CI/CD with Compose

on:
  push:
    branches: ["main"]

jobs:

  # 🔹 JOB 1: Setup & Validation
  setup:
    name: Setup & Validate
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Verify Docker & Compose
        run: |
          docker --version
          docker compose version

      - name: Basic check
        run: echo "Environment ready"


  # 🔹 JOB 2: Build Images using Docker Compose
  build-images:
    name: Build Images (Backend + Frontend)
    runs-on: ubuntu-latest
    needs: setup

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build using docker compose
        run: docker compose build

      - name: Show built images
        run: docker images

      # ✅ Save BOTH images
      - name: Save backend image
        run: |
          docker save project-backend:latest | gzip > backend.tar.gz

      - name: Save frontend image
        run: |
          docker save project-frontend:latest | gzip > frontend.tar.gz

      # ✅ Upload artifacts
      - name: Upload backend artifact
        uses: actions/upload-artifact@v4
        with:
          name: backend-image
          path: backend.tar.gz

      - name: Upload frontend artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-image
          path: frontend.tar.gz


  # 🔹 JOB 3: Push Images to Docker Hub
  push-images:
    name: Push Images to Docker Hub
    runs-on: ubuntu-latest
    needs: build-images

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # ✅ Download artifacts
      - name: Download backend image
        uses: actions/download-artifact@v4
        with:
          name: backend-image
          path: .

      - name: Download frontend image
        uses: actions/download-artifact@v4
        with:
          name: frontend-image
          path: .

      # ✅ Load images
      - name: Load backend image
        run: gunzip -c backend.tar.gz | docker load

      - name: Load frontend image
        run: gunzip -c frontend.tar.gz | docker load

      # 🔐 Login
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # ✅ Tag images correctly
      - name: Tag images
        run: |
          docker tag project-backend:latest ${{ secrets.DOCKER_USERNAME }}/patient-backend:latest
          docker tag project-frontend:latest ${{ secrets.DOCKER_USERNAME }}/patient-frontend:latest

      # 🚀 Push images
      - name: Push images
        run: |
          docker push ${{ secrets.DOCKER_USERNAME }}/patient-backend:latest
          docker push ${{ secrets.DOCKER_USERNAME }}/patient-frontend:latest