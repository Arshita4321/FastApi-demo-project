name: CI/CD - Build & Push Docker Images

on:
  push:
    branches: [ "main" ]

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:

    # 1️⃣ Checkout code
    - name: Checkout repository
      uses: actions/checkout@v4

    # 2️⃣ Login to Docker Hub
    - name: Login to Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    # 3️⃣ Extract short commit SHA (for tagging)
    - name: Set image tag
      id: vars
      run: echo "TAG=${GITHUB_SHA::7}" >> $GITHUB_ENV

    # 4️⃣ Build Backend Image
    - name: Build Backend Image
      run: |
        docker build -t ${{ secrets.DOCKER_USERNAME }}/patient-backend:latest \
                     -t ${{ secrets.DOCKER_USERNAME }}/patient-backend:${{ env.TAG }} \
                     ./backend

    # 5️⃣ Build Frontend Image
    - name: Build Frontend Image
      run: |
        docker build -t ${{ secrets.DOCKER_USERNAME }}/patient-frontend:latest \
                     -t ${{ secrets.DOCKER_USERNAME }}/patient-frontend:${{ env.TAG }} \
                     ./frontend

    # 6️⃣ Push Backend Image
    - name: Push Backend Image
      run: |
        docker push ${{ secrets.DOCKER_USERNAME }}/patient-backend:latest
        docker push ${{ secrets.DOCKER_USERNAME }}/patient-backend:${{ env.TAG }}

    # 7️⃣ Push Frontend Image
    - name: Push Frontend Image
      run: |
        docker push ${{ secrets.DOCKER_USERNAME }}/patient-frontend:latest
        docker push ${{ secrets.DOCKER_USERNAME }}/patient-frontend:${{ env.TAG }}